server:
  port: ${SERVER_PORT:8005}

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/skillbridge_db}
    username: ${SPRING_DATASOURCE_USERNAME:skillbridge}
    password: ${SPRING_DATASOURCE_PASSWORD:password}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: mock_interview
  flyway:
    enabled: true
    schemas: mock_interview
    locations: classpath:db/migration
    baseline-on-migrate: true
  jackson:
    mapper:
      accept-case-insensitive-enums: false
  servlet:
   multipart:
      max-file-size: 25MB
      max-request-size: 25MB

jwt:
  secret: ${JWT_SECRET}

anthropic:
  api-key: ${ANTHROPIC_API_KEY}
  model: claude-sonnet-4-6
  max-tokens: 2048

claude:
  connect-timeout-ms: 15000
  read-timeout-ms: 180000

whisper:
  url: ${WHISPER_URL:http://localhost:9000}
  timeout-ms: ${WHISPER_TIMEOUT_MS:60000}
  startup-probe: ${WHISPER_STARTUP_PROBE:true}

springdoc:
  swagger-ui:
    path: /swagger-ui/index.html
