server:
  port: ${SERVER_PORT:8003}

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/skillbridge_db}
    username: ${SPRING_DATASOURCE_USERNAME:skillbridge}
    password: ${SPRING_DATASOURCE_PASSWORD:password}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: skill_gap
  flyway:
    enabled: true
    schemas: skill_gap
    locations: classpath:db/migration
    baseline-on-migrate: true
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 6MB

jwt:
  secret: ${JWT_SECRET}

anthropic:
  api-key: ${ANTHROPIC_API_KEY}
  model: claude-sonnet-4-6
  max-tokens: 4096

claude:
  connect-timeout-ms: 15000
  read-timeout-ms: 120000

file:
  upload-dir: ${FILE_UPLOAD_DIR:/app/uploads}

springdoc:
  swagger-ui:
    path: /swagger-ui/index.html
