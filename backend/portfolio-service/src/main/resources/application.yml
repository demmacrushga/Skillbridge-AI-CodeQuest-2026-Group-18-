server:
  port: ${SERVER_PORT:8004}

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/skillbridge_db}
    username: ${SPRING_DATASOURCE_USERNAME:skillbridge}
    password: ${SPRING_DATASOURCE_PASSWORD:password}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: portfolio
  flyway:
    enabled: true
    schemas: portfolio
    locations: classpath:db/migration
    baseline-on-migrate: true

jwt:
  secret: ${JWT_SECRET}

anthropic:
  api-key: ${ANTHROPIC_API_KEY}
  model: claude-sonnet-4-6
  verification-max-tokens: 256
  extraction-max-tokens: 4096

claude:
  connect-timeout-ms: 15000
  read-timeout-ms: 120000

portfolio:
  extraction:
    max-html-chars: 50000
    url-connect-timeout-ms: 15000
    url-read-timeout-ms: 30000

springdoc:
  swagger-ui:
    path: /swagger-ui/index.html
