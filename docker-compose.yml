services:
  postgres:
    image: postgres:16-alpine
    container_name: skillbridge-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  auth-service:
    build:
      context: ./backend/auth-service
      dockerfile: Dockerfile
      network: host
    container_name: skillbridge-auth
    ports:
      - "8001:8001"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRY_HOURS: ${JWT_EXPIRY_HOURS:-24}
      SERVER_PORT: 8001
    depends_on:
      postgres:
        condition: service_healthy

  career-service:
    build:
      context: ./backend/career-service
      dockerfile: Dockerfile
      network: host
    container_name: skillbridge-career
    ports:
      - "8002:8002"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      NOTIFICATION_URL: http://notification-service:8009
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN}
      SERVER_PORT: 8002
    depends_on:
      postgres:
        condition: service_healthy

  skill-gap-service:
    build:
      context: ./backend/skill-gap-service
      dockerfile: Dockerfile
      network: host
    container_name: skillbridge-skill-gap
    ports:
      - "8003:8003"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      FILE_UPLOAD_DIR: /app/uploads
      SERVER_PORT: 8003
    volumes:
      - skillgap_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

  portfolio-service:
    build:
      context: ./backend/portfolio-service
      dockerfile: Dockerfile
      network: host
    container_name: skillbridge-portfolio
    ports:
      - "8004:8004"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      SERVER_PORT: 8004
    depends_on:
      postgres:
        condition: service_healthy

  mock-interview-service:
    build:
      context: ./backend/mock-interview-service
      dockerfile: Dockerfile
      network: host
    container_name: skillbridge-mock-interview
    ports:
      - "8005:8005"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      WHISPER_URL: http://whisper-service:9000
      WHISPER_TIMEOUT_MS: 60000
      WHISPER_STARTUP_PROBE: "true"
      SERVER_PORT: 8005
    depends_on:
      postgres:
        condition: service_healthy
      whisper-service:
        condition: service_healthy
  challenge-service:
    build:
      context: ./backend/challenge-service
      dockerfile: Dockerfile
      network: host
    container_name: skillbridge-challenge
    ports:
      - "8007:8007"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      NOTIFICATION_URL: http://notification-service:8009
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN}
      SERVER_PORT: 8007
    depends_on:
      postgres:
        condition: service_healthy

  mentorship-service:
    build:
      context: ./backend/mentorship-service
      dockerfile: Dockerfile
      network: host
    container_name: skillbridge-mentorship
    ports:
      - "8008:8008"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      NOTIFICATION_URL: http://notification-service:8009
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN}
      SERVER_PORT: 8008
    depends_on:
      postgres:
        condition: service_healthy

  notification-service:
    build:
      context: ./backend/notification-service
      dockerfile: Dockerfile
      network: host
    container_name: skillbridge-notification
    ports:
      - "8009:8009"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN}
      EXPO_PUSH_URL: ${EXPO_PUSH_URL:-https://exp.host/--/api/v2/push/send}
      SERVER_PORT: 8009
    depends_on:
      postgres:
        condition: service_healthy

  matching-service:
    build:
      context: ./backend/matching-service
      dockerfile: Dockerfile
      network: host
    container_name: skillbridge-matching
    ports:
      - "8006:8006"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      NOTIFICATION_URL: http://notification-service:8009
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN}
      SERVER_PORT: 8006
    depends_on:
      postgres:
        condition: service_healthy

  whisper-service:
    build:
      context: ./backend/whisper-service
      dockerfile: Dockerfile
    container_name: skillbridge-whisper
    ports:
      - "9000:9000"
    environment:
      WHISPER_MODEL: tiny.en
      PORT: 9000
    volumes:
      - whisper-model-cache:/root/.cache
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:9000/health')\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  gateway:
    image: nginx:alpine
    container_name: skillbridge-gateway
    ports:
      - "8080:8080"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth-service
      - career-service
      - skill-gap-service
      - portfolio-service
      - mock-interview-service
      - matching-service
      - challenge-service
      - mentorship-service
      - notification-service
      - whisper-service

volumes:
  postgres_data:
  skillgap_uploads:
  whisper-model-cache:
